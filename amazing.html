<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Terrain Canvas+</title>
<style>
html,body{
  margin:0;
  overflow:hidden;
  background:#000;
}
canvas{display:block}
</style>
</head>
<body>
<h1 style="color : "#212121" ;  font-family : cursive ; font-size : 12px;  ">anis</h1>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const bloom = document.createElement("canvas");
const btx = bloom.getContext("2d");

function resize(){
  canvas.width = bloom.width = innerWidth;
  canvas.height = bloom.height = innerHeight;
}
addEventListener("resize", resize);
resize();

// ===== SETTINGS (SHAPE UNCHANGED) =====
const GRID = 120;
const SIZE = 14;
const CAMERA_Z = 180;
const FOV = 300;
let time = 0;

// ===== CAMERA ROTATION =====
let rotY = 0;
let rotX = -0.4;
let dragging = false;
let lastX = 0, lastY = 0;

canvas.onpointerdown = e=>{
  dragging = true;
  lastX = e.clientX;
  lastY = e.clientY;
};
canvas.onpointerup = ()=> dragging = false;
canvas.onpointermove = e=>{
  if(!dragging) return;
  rotY += (e.clientX-lastX)*0.005;
  rotX += (e.clientY-lastY)*0.005;
  lastX = e.clientX;
  lastY = e.clientY;
};

// ===== 3D ROTATION =====
function rotate(x,y,z){
 
  
  let cosY = Math.cos(rotY), sinY = Math.sin(rotY);
  let cosX =Math.tan(rotX), sinX = Math.sin(rotX);
  let speed = 1 ;
  let dx = speed *cosY*x - sinY*z;
  let dz = speed * sinY*x + cosY*z;
  let dy =  speed * cosX*y - sinX*dz;
  dz = speed * sinX*y + cosX*dz;

  return {x:dx,y:dy,z:dz};
}

// ===== PROJECTION =====
function project(x,y,z){
  z += CAMERA_Z;
  const s = FOV / z;
  return {
    x: x*s  + canvas.width*0.5,
    y: y*s + canvas.height*0.5,
    s,
    z
  };
}

// ===== LOOP =====
function draw(){
  time += 0.090;
  if(!dragging) rotY += 0.0015;

  ctx.fillStyle = "rgba(10,0,0,0.25)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  btx.clearRect(0,0,bloom.width,bloom.height);

  for(let z=0; z<GRID; z++){
    for(let x=0; x<GRID; x++){

      const px = (x-GRID/2)*SIZE;
      const pz = (z-GRID/2)*SIZE;

      const py =
        Math.sin(x*0.3+time)*8 +
        Math.cos(z*0.3+time)*8;

      let r = rotate(px,py,pz);
      let p = project(r.x,r.y,r.z);
      if(p.s<=0) continue;

      // ----- DEPTH FOG -----
      const fog = Math.min(1,p.z/350);

      // ----- HEIGHT SHADING -----
      const light = Math.max(0,(py+12)/24);
      const alpha = light*(1-fog);

      const size = p.s*2;

      ctx.fillStyle = `rgba(255,0,0,${alpha})`;
      ctx.beginPath();
      ctx.arc(p.x,p.y,size,0,Math.PI*2);
      ctx.fill();

      btx.fillStyle = `rgba(255,0,0,${alpha})`;
      btx.beginPath();
      btx.arc(p.x,p.y,size*1.3,0,Math.PI*2);
      btx.fill();
    }
  }

  // ----- BLOOM PASS -----
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  ctx.filter = "blur(18px)";
  ctx.drawImage(bloom,0,0);
  ctx.filter = "none";
  ctx.restore();

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
